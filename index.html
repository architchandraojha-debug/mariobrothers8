<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mario Brothers Group Site</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 0;
      text-align: center;
    }
    h1 {
      background: #333;
      color: #fff;
      padding: 20px;
      margin: 0;
      font-size: 2em;
    }
    .section {
      margin: 30px auto;
      padding: 20px;
      border: 1px solid #ccc;
      background: #fff;
      width: 60%;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    input {
      padding: 10px;
      margin: 10px;
      width: 200px;
    }
    button {
      padding: 10px 20px;
      cursor: pointer;
    }
    iframe {
      width: 100%;
      height: 500px;
      border: none;
    }
  </style>
</head>
<body>
  <!-- Top Heading -->
  <h1>WELCOME TO MARIO BROTHERS</h1>

  <!-- Join Form Section -->
  <div class="section" id="join-form">
    <h2>Join Form</h2>
    <iframe src="PASTE_YOUR_GOOGLE_FORM_RESPONDER_LINK_HERE"></iframe>
  </div>

  <!-- PIN Section -->
  <div class="section" id="pin-section">
    <h2>Enter PIN to Access</h2>
    <input type="password" id="pin-input" placeholder="Enter PIN">
    <button onclick="checkPin()">Submit</button>
    <p id="pin-message"></p>
  </div>

  <script>
    function checkPin() {
      const pin = document.getElementById("pin-input").value;
      const message = document.getElementById("pin-message");

      const validPins = ["TECHNOLOGIA"]; // ✅ Add your PINs here

      if (validPins.includes(pin)) {
        message.textContent = "Access granted! Redirecting...";
        // Redirect to Notice Board page
        window.location.href = "notice.html";
      } else {
        message.textContent = "Incorrect PIN. Try again.";
      }
    }
  </script>
</body>
</html>
