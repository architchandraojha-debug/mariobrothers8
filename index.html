<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Group Website</title>
  <style>
    .section {
      margin: 20px;
      padding: 10px;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>
  <!-- Join Form Section -->
  <div class="section">
    <h2>Join Form</h2>
    <!-- Use the responder link from Google Forms here -->
    <iframe src=https://docs.google.com/forms/d/e/1FAIpQLSfpMi44yInuVEbAFU31yfGXaAtXmN86HcckYGlDjDqZ1UXWhw/viewform?usp=header 
            width="640" height="800" frameborder="0"></iframe>
  </div>

  <!-- PIN Section -->
  <div class="section">
    <h2>Enter PIN to Access</h2>
    <form>
      <input type="password" name="pin" placeholder="Enter PIN">
      <input type="submit" value="Submit">
    </form>
    <p>(This PIN field is just visual in HTML‑only mode — it won’t be disturbed by the form.)</p>
  </div>

  <!-- Notice Board Section -->
  <div class="section">
    <h2>Notice Board</h2>
    <p>Welcome to the group! 🎉</p>
  </div>
</body>
</html>
