<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Group Notice Board</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 0;
      text-align: center;
    }
    h1 {
      background: #333;
      color: #fff;
      padding: 20px;
      margin: 0;
      font-size: 2em;
    }
    .notice-board {
      margin: 40px auto;
      padding: 20px;
      width: 70%;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    .notice {
      margin: 15px 0;
      padding: 10px;
      border-bottom: 1px solid #eee;
    }
    .notice:last-child {
      border-bottom: none;
    }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      background: #c0392b;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Group Notice Board</h1>

  <div class="notice-board">
    <div class="notice"><strong>Admin Notice 1:</strong> Welcome new members! 🎉</div>
    <div class="notice"><strong>Admin Notice 2:</strong> First group meetup on Saturday!</div>
    <div class="notice"><strong>Admin Notice 3:</strong> Don’t forget to bring your ideas.</div>

    <!-- Throw Out Member Button -->
    <button onclick="throwOutMember()">Throw Out Member</button>
  </div>

  <script>
    function throwOutMember() {
      alert("Member has been thrown out! 🚪");
    }
  </script>
</body>
</html>
